services:
  - type: web
    name: ki-assistent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEMO_MODE
        value: "false"
    disk:
      name: ki-assistent-data
      mountPath: /data
      sizeGB: 1
